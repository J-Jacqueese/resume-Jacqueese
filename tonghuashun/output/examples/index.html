// ── i18n ──
var currentLang = (function() {
  var saved = localStorage.getItem('dashboard-lang');
  return saved === 'en' ? 'en' : 'zh';
})();

function t(key) {
  var map = DASHBOARD_DATA.i18n[currentLang];
  return map[key] || key;
}

function switchLang(lang) {
  currentLang = lang;
  localStorage.setItem('dashboard-lang', lang);
  document.getElementById('btn-zh').className = lang === 'zh' ? 'active' : '';
  document.getElementById('btn-en').className = lang === 'en' ? 'active' : '';
  refreshUI();
}

function refreshUI() {
  // Update all translatable elements
  document.getElementById('page-title').textContent = t('title');
  document.getElementById('title-category').textContent = t('category_distribution');
  document.getElementById('title-sentiment').textContent = t('sentiment_analysis');
  document.getElementById('title-impact').textContent = t('impact_ranking');
  document.getElementById('title-radar').textContent = t('ai_domain_radar');
  document.getElementById('title-network').textContent = t('entity_network');
  document.getElementById('title-risk').textContent = t('risk_opp_radar');
  document.getElementById('th-type').textContent = t('type');
  document.getElementById('th-title').textContent = t('title_col');
  document.getElementById('th-level').textContent = t('level');
  document.getElementById('th-desc').textContent = t('description');
  document.getElementById('footer-text').textContent = t('footer');
  document.getElementById('report-date').textContent = t('report_date') + ': ' + DASHBOARD_DATA.metadata.report_date;

  // Re-render data-driven content (HTML-based — always safe)
  renderOverview(DASHBOARD_DATA.overview);
  renderHotTopics(DASHBOARD_DATA.hot_topics);
  renderTrends(DASHBOARD_DATA.trend_summary);
  renderRiskOppTable(DASHBOARD_DATA.risk_opportunities);

  // Dispose existing ECharts instances before re-render
  if (typeof echarts !== 'undefined') {
    ['chart-category','chart-sentiment','chart-impact','chart-radar'].forEach(function(id) {
      var inst = echarts.getInstanceByDom(document.getElementById(id));
      if (inst) inst.dispose();
    });
  }
  // Chart renderers — wrapped for CDN resilience
  if (typeof echarts !== 'undefined') {
    try { renderCategoryChart(DASHBOARD_DATA.category_distribution); } catch(e) { console.error('Category chart:', e); }
    try { renderSentimentChart(DASHBOARD_DATA.sentiment_distribution); } catch(e) { console.error('Sentiment chart:', e); }
    try { renderImpactChart(DASHBOARD_DATA.impact_ranking); } catch(e) { console.error('Impact chart:', e); }
    try { renderRadarChart(DASHBOARD_DATA.domain_radar); } catch(e) { console.error('Radar chart:', e); }
  }
  if (typeof d3 !== 'undefined') {
    try { renderNetworkChart(DASHBOARD_DATA.entity_network); } catch(e) { console.error('Network chart:', e); }
  }
}

function renderOverview(ov) {
  if (!ov) return;
  document.getElementById('overview-cards').innerHTML =
    '<div class="card"><div class="number accent">' + (ov.total_articles || 0) + '</div><div class="label">' + t('articles_analyzed') + '</div></div>' +
    '<div class="card"><div class="number warning">' + (ov.hot_topics_count || 0) + '</div><div class="label">' + t('hot_topics') + '</div></div>' +
    '<div class="card"><div class="number negative">' + (ov.risks_count || 0) + '</div><div class="label">' + t('risks_identified') + '</div></div>' +
    '<div class="card"><div class="number positive">' + (ov.opportunities_count || 0) + '</div><div class="label">' + t('opportunities_found') + '</div></div>';
}

function renderHotTopics(topics) {
  if (!topics || !topics.length) return;
  var html = '<h2 style="margin-bottom:16px">' + t('todays_top_stories') + '</h2>';
  topics.forEach(function(topic) {
    // Source links
    var sourcesHtml = '';
    if (topic.sources && topic.sources.length) {
      sourcesHtml = '<div class="source-links"><span class="source-label">' + t('sources') + ':</span>';
      topic.sources.forEach(function(s) {
        var zhClass = s.lang === 'zh' ? ' zh' : '';
        sourcesHtml += '<a class="source-badge' + zhClass + '" href="' + s.url + '" target="_blank" rel="noopener" title="' + s.title + '">' +
          s.name + ' <span class="arrow">↗</span></a>';
      });
      sourcesHtml += '</div>';
    }

    html += '<div class="hot-topic-item">' +
      '<span class="rank">#' + topic.rank + '</span>' +
      '<h4>' + topic.title + '</h4>' +
      '<div class="meta">' + t('impact') + ': ' + repeatStr('⭐', topic.magnitude || 1) + ' &middot; ' + (topic.category || '') + ' &middot; ' + ((topic.key_players || []).join(', ')) + '</div>' +
      '<p>' + topic.summary + '</p>' +
      sourcesHtml +
      '</div>';
  });
  document.getElementById('hot-topics').innerHTML = html;
}

function repeatStr(str, count) {
  return Array(count + 1).join(str);
}

function renderCategoryChart(data) {
  var dom = document.getElementById('chart-category');
  if (!data || !data.length) return;
  var chart = echarts.init(dom);
  chart.setOption({
    tooltip: { trigger: 'item' },
    series: [{
      type: 'pie', radius: ['45%', '75%'],
      itemStyle: { borderRadius: 6, borderColor: '#0f0f1a', borderWidth: 3 },
      label: { color: '#888', fontSize: 12 },
      data: data.map(function(d) { return { name: d.category, value: d.count }; })
    }]
  });
}

function renderSentimentChart(data) {
  if (!data) return;
  var chart = echarts.init(document.getElementById('chart-sentiment'));
  chart.setOption({
    tooltip: { trigger: 'axis' },
    xAxis: { type: 'category', data: [t('positive'), t('neutral'), t('negative')], axisLabel: { color: '#888' } },
    yAxis: { type: 'value', axisLabel: { color: '#888' } },
    series: [{
      type: 'bar',
      data: [
        { value: data.positive || 0, itemStyle: { color: '#4caf50' } },
        { value: data.neutral || 0, itemStyle: { color: '#ff9800' } },
        { value: data.negative || 0, itemStyle: { color: '#f44336' } }
      ],
      barWidth: '50%'
    }]
  });
}

function renderImpactChart(data) {
  if (!data || !data.length) return;
  var chart = echarts.init(document.getElementById('chart-impact'));
  chart.setOption({
    tooltip: {
      trigger: 'axis', axisPointer: { type: 'shadow' },
      formatter: function(params) {
        var d = params[0];
        var item = data[data.length - 1 - d.dataIndex];
        var label = item ? (item.article_title || item.source_name || '') : '';
        return label ? label + '<br/>' + t('impact') + ': ' + d.value : t('impact') + ': ' + d.value;
      }
    },
    grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
    xAxis: { type: 'value', max: 5, axisLabel: { color: '#888' } },
    yAxis: { type: 'category', data: data.map(function(d) { return (d.article_title || d.id).substring(0, 40); }).reverse(), axisLabel: { color: '#ccc', fontSize: 11, width: 140, overflow: 'truncate' } },
    series: [{
      type: 'bar',
      data: data.map(function(d) {
        return { value: d.magnitude, itemStyle: { color: d.magnitude >= 4 ? '#ff6b6b' : d.magnitude >= 3 ? '#ffd93d' : '#00d4ff' } };
      }),
      barWidth: '60%',
      label: { show: true, position: 'right', color: '#888' }
    }]
  });
  // Click handler to open source URL
  chart.on('click', function(params) {
    var idx = data.length - 1 - params.dataIndex;
    if (idx >= 0 && data[idx].source_url) {
      window.open(data[idx].source_url, '_blank');
    }
  });
}

function renderRadarChart(data) {
  if (!data || !data.length) return;
  var chart = echarts.init(document.getElementById('chart-radar'));
  var maxCount = Math.max.apply(null, data.map(function(d) { return d.count; }).concat([1]));
  chart.setOption({
    radar: {
      indicator: data.map(function(d) { return { name: d.domain, max: maxCount }; }),
      center: ['50%', '55%'], radius: '70%',
      axisName: { color: '#ccc', fontSize: 11 }
    },
    series: [{
      type: 'radar',
      data: [{ value: data.map(function(d) { return d.count; }), name: 'Article Count', areaStyle: { color: 'rgba(0,212,255,0.2)' }, lineStyle: { color: '#00d4ff' }, itemStyle: { color: '#00d4ff' } }]
    }]
  });
}

function renderNetworkChart(data) {
  var container = document.getElementById('chart-network');
  container.innerHTML = '';
  if (!data || !data.nodes || !data.nodes.length) {
    container.innerHTML = '<div style="text-align:center;padding:100px;color:#888">' + t('no_entity_data') + '</div>';
    return;
  }
  var width = container.clientWidth || 700;
  var height = 420;

  // Normalize ID: lowercase + replace underscores with spaces
  function normId(id) { return String(id).toLowerCase().replace(/_/g, ' ').trim(); }

  // Build node lookup by normalized ID
  var nodeMap = {};
  var nodes = data.nodes.map(function(d) {
    var n = Object.assign({}, d, { radius: Math.max(8, Math.min(30, (d.weight || 1) * 5)) });
    nodeMap[normId(d.id)] = n;
    return n;
  });

  // Resolve edge refs — auto-add missing nodes, use exact IDs from nodeMap
  var validLinks = [];
  (data.edges || []).forEach(function(e) {
    var srcNorm = normId(e.source);
    var tgtNorm = normId(e.target);
    // Auto-add missing source node
    if (!nodeMap[srcNorm]) {
      var newNode = { id: e.source.replace(/_/g, ' '), group: 'organization', weight: 1, radius: 10 };
      nodeMap[srcNorm] = newNode;
      nodes.push(newNode);
    }
    // Auto-add missing target node
    if (!nodeMap[tgtNorm]) {
      var newNode = { id: e.target.replace(/_/g, ' '), group: 'organization', weight: 1, radius: 10 };
      nodeMap[tgtNorm] = newNode;
      nodes.push(newNode);
    }
    validLinks.push({
      source: nodeMap[srcNorm].id,
      target: nodeMap[tgtNorm].id,
      relation: e.relation,
      strength: e.strength
    });
  });

  var svg = d3.select('#chart-network').append('svg').attr('width', width).attr('height', height);

  var simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(validLinks).id(function(d) { return d.id; }).distance(100))
    .force('charge', d3.forceManyBody().strength(-200))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide().radius(function(d) { return d.radius + 2; }));

  var link = svg.append('g').selectAll('line').data(validLinks).join('line')
    .attr('stroke', '#2a2a4a').attr('stroke-width', function(d) { return Math.max(1, (d.strength || 0.5) * 3); });

  var node = svg.append('g').selectAll('circle').data(nodes).join('circle')
    .attr('r', function(d) { return d.radius; }).attr('fill', '#00d4ff').attr('opacity', 0.8)
    .call(d3.drag()
      .on('start', function(e, d) { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', function(e, d) { d.fx = e.x; d.fy = e.y; })
      .on('end', function(e, d) { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));

  var label = svg.append('g').selectAll('text').data(nodes).join('text')
    .text(function(d) { return d.id; }).attr('font-size', 10).attr('fill', '#ccc').attr('text-anchor', 'middle').attr('dy', function(d) { return d.radius + 12; });

  simulation.on('tick', function() {
    link.attr('x1', function(d) { return d.source.x; }).attr('y1', function(d) { return d.source.y; })
      .attr('x2', function(d) { return d.target.x; }).attr('y2', function(d) { return d.target.y; });
    node.attr('cx', function(d) { return d.x; }).attr('cy', function(d) { return d.y; });
    label.attr('x', function(d) { return d.x; }).attr('y', function(d) { return d.y; });
  });

  // Legend
  var relationTypes = [];
  validLinks.forEach(function(l) { if (relationTypes.indexOf(l.relation) === -1) relationTypes.push(l.relation); });
  var legend = svg.append('g').attr('transform', 'translate(10, ' + (height - 20 - relationTypes.length * 20) + ')');
  relationTypes.forEach(function(rel, i) {
    legend.append('rect').attr('x', 0).attr('y', i * 20).attr('width', 12).attr('height', 12).attr('fill', '#00d4ff').attr('opacity', 0.6);
    legend.append('text').attr('x', 18).attr('y', i * 20 + 10).text(rel.replace(/_/g, ' ')).attr('fill', '#888').attr('font-size', 10);
  });
}

function renderRiskOppTable(items) {
  if (!items || !items.length) return;
  var html = '';
  items.forEach(function(item) {
    var typeLabel = item.type === 'risk' ? t('risk') : t('opportunity');
    var typeBadge = item.type === 'risk'
      ? '<span class="badge badge-risk">' + typeLabel + '</span>'
      : '<span class="badge badge-opportunity">' + typeLabel + '</span>';
    var level = item.severity || item.potential || 'medium';
    var levelLabel = level === 'high' ? t('high') : level === 'medium' ? t('medium') : t('low');

    html += '<tr><td>' + typeBadge + '</td><td>' + item.title + '</td><td>' + levelBadge + '</td><td>' + item.description + '</td></tr>';
  });
  document.querySelector('#risk-opp-table tbody').innerHTML = html;
}

})(DASHBOARD_DATA);
</script>
