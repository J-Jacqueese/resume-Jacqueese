<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Daily Insight Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root {
  --bg: #0f0f1a; --card-bg: #1a1a2e; --border: #2a2a4a;
  --text: #e0e0e0; --text-dim: #888;
  --accent: #00d4ff; --positive: #4caf50; --negative: #f44336;
  --neutral: #ff9800; --warning: #ffd93d;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  padding: 24px; line-height: 1.5;
}
.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 32px; flex-wrap: wrap; gap: 12px;
}
.header h1 {
  font-size: 28px;
  background: linear-gradient(135deg, var(--accent), #7c4dff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.header .date { color: var(--text-dim); font-size: 14px; }
.lang-toggle {
  display: flex; gap: 0; border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
}
.lang-toggle button {
  padding: 6px 14px; border: none; cursor: pointer; font-size: 13px; font-weight: 600;
  background: var(--card-bg); color: var(--text-dim); transition: all 0.2s;
}
.lang-toggle button.active { background: var(--accent); color: var(--bg); }
.lang-toggle button:hover:not(.active) { color: var(--text); }
.overview-cards {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.card {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; text-align: center;
}
.card .number { font-size: 36px; font-weight: 700; }
.card .label { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
.card .number.accent { color: var(--accent); }
.card .number.positive { color: var(--positive); }
.card .number.warning { color: var(--warning); }
.card .number.negative { color: var(--negative); }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.chart-card {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px;
}
.chart-card h3 { font-size: 15px; margin-bottom: 12px; color: var(--text); }
.chart { width: 100%; height: 320px; }
.chart-lg { width: 100%; height: 420px; }
.hot-topics { margin-bottom: 24px; }
.hot-topic-item {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; margin-bottom: 12px;
}
.hot-topic-item .rank {
  display: inline-block; background: var(--accent); color: var(--bg);
  font-weight: 700; font-size: 14px; padding: 2px 10px; border-radius: 20px; margin-right: 12px;
}
.hot-topic-item h4 { display: inline; font-size: 17px; }
.hot-topic-item .meta { color: var(--text-dim); font-size: 13px; margin: 8px 0; }
.hot-topic-item p { font-size: 14px; margin-top: 8px; color: #ccc; }
.source-links { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.source-links .source-label { font-size: 12px; color: var(--text-dim); margin-right: 4px; display: flex; align-items: center; }
.source-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 14px; font-size: 11px; font-weight: 500;
  text-decoration: none; transition: all 0.2s;
  background: rgba(0,212,255,0.1); color: var(--accent); border: 1px solid rgba(0,212,255,0.2);
}
.source-badge:hover { background: rgba(0,212,255,0.2); border-color: var(--accent); }
.source-badge.zh { background: rgba(124,77,255,0.1); color: #b39ddb; border: 1px solid rgba(124,77,255,0.2); }
.source-badge.zh:hover { background: rgba(124,77,255,0.2); border-color: #7c4dff; }
.source-badge .arrow { font-size: 10px; opacity: 0.7; }
.trend-section {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; margin-bottom: 16px;
}
.trend-section h3 { margin-bottom: 8px; }
.trend-dim { display: inline-block; background: #2a2a4a; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-right: 8px; }
.risk-opp-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
.risk-opp-table th, .risk-opp-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
.risk-opp-table th { color: var(--text-dim); font-weight: 600; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.badge-risk { background: rgba(244,67,54,0.2); color: var(--negative); }
.badge-opportunity { background: rgba(76,175,80,0.2); color: var(--positive); }
.badge-high { background: rgba(244,67,54,0.15); color: #ff6b6b; }
.badge-medium { background: rgba(255,152,0,0.15); color: var(--neutral); }
.badge-low { background: rgba(76,175,80,0.15); color: var(--positive); }
footer { text-align: center; color: var(--text-dim); font-size: 12px; margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); }
@media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } .header { flex-direction: column; text-align: center; } }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1 id="page-title">🤖 AI 舆情洞察日报</h1>
    <div class="date" id="report-date">Loading...</div>
  </div>
  <div class="lang-toggle">
    <button id="btn-zh" onclick="switchLang('zh')">中文</button>
    <button id="btn-en" onclick="switchLang('en')">EN</button>
  </div>
</div>

<div class="overview-cards" id="overview-cards"></div>
<div class="hot-topics" id="hot-topics"></div>

<div class="grid-2">
  <div class="chart-card"><h3 id="title-category">📊 分类分布</h3><div class="chart" id="chart-category"></div></div>
  <div class="chart-card"><h3 id="title-sentiment">🎭 情感分析</h3><div class="chart" id="chart-sentiment"></div></div>
</div>

<div class="grid-2">
  <div class="chart-card"><h3 id="title-impact">📈 影响力排名 (Top 10)</h3><div class="chart" id="chart-impact"></div></div>
  <div class="chart-card"><h3 id="title-radar">🎯 AI 领域雷达</h3><div class="chart" id="chart-radar"></div></div>
</div>

<div class="chart-card" style="margin-bottom:16px">
  <h3 id="title-network">🔗 实体关系网络</h3>
  <div class="chart-lg" id="chart-network"></div>
</div>

<div class="trend-section" id="trend-section"></div>

<div class="chart-card" style="margin-bottom:16px">
  <h3 id="title-risk">⚠️ 风险与机会</h3>
  <table class="risk-opp-table" id="risk-opp-table">
    <thead><tr><th id="th-type">类型</th><th id="th-title">标题</th><th id="th-level">级别</th><th id="th-desc">描述</th></tr></thead>
    <tbody></tbody>
  </table>
</div>

<footer id="footer-text">由 AI Daily Insight Engine 生成</footer>

<script>
// ── Embedded dashboard data (generated by enrichment pipeline) ──
DASHBOARD_DATA_PLACEHOLDER

// ── i18n ──
var currentLang = (function() {
  var saved = localStorage.getItem('dashboard-lang');
  return saved === 'en' ? 'en' : 'zh';
})();

function t(key) {
  var map = DASHBOARD_DATA.i18n[currentLang];
  return map[key] || key;
}

function switchLang(lang) {
  currentLang = lang;
  localStorage.setItem('dashboard-lang', lang);
  document.getElementById('btn-zh').className = lang === 'zh' ? 'active' : '';
  document.getElementById('btn-en').className = lang === 'en' ? 'active' : '';
  refreshUI();
}

function refreshUI() {
  // Update all translatable elements
  document.getElementById('page-title').textContent = t('title');
  document.getElementById('title-category').textContent = t('category_distribution');
  document.getElementById('title-sentiment').textContent = t('sentiment_analysis');
  document.getElementById('title-impact').textContent = t('impact_ranking');
  document.getElementById('title-radar').textContent = t('ai_domain_radar');
  document.getElementById('title-network').textContent = t('entity_network');
  document.getElementById('title-risk').textContent = t('risk_opp_radar');
  document.getElementById('th-type').textContent = t('type');
  document.getElementById('th-title').textContent = t('title_col');
  document.getElementById('th-level').textContent = t('level');
  document.getElementById('th-desc').textContent = t('description');
  document.getElementById('footer-text').textContent = t('footer');
  document.getElementById('report-date').textContent = t('report_date') + ': ' + DASHBOARD_DATA.metadata.report_date;

  // Re-render data-driven content
  renderOverview(DASHBOARD_DATA.overview);
  renderHotTopics(DASHBOARD_DATA.hot_topics);
  renderCategoryChart(DASHBOARD_DATA.category_distribution);
  renderSentimentChart(DASHBOARD_DATA.sentiment_distribution);
  renderImpactChart(DASHBOARD_DATA.impact_ranking);
  renderRadarChart(DASHBOARD_DATA.domain_radar);
  renderNetworkChart(DASHBOARD_DATA.entity_network);
  renderTrends(DASHBOARD_DATA.trend_summary);
  renderRiskOppTable(DASHBOARD_DATA.risk_opportunities);
}

// ── Render functions ──

function renderOverview(ov) {
  if (!ov) return;
  document.getElementById('overview-cards').innerHTML =
    '<div class="card"><div class="number accent">' + (ov.total_articles || 0) + '</div><div class="label">' + t('articles_analyzed') + '</div></div>' +
    '<div class="card"><div class="number warning">' + (ov.hot_topics_count || 0) + '</div><div class="label">' + t('hot_topics') + '</div></div>' +
    '<div class="card"><div class="number negative">' + (ov.risks_count || 0) + '</div><div class="label">' + t('risks_identified') + '</div></div>' +
    '<div class="card"><div class="number positive">' + (ov.opportunities_count || 0) + '</div><div class="label">' + t('opportunities_found') + '</div></div>';
}

function renderHotTopics(topics) {
  if (!topics || !topics.length) return;
  var html = '<h2 style="margin-bottom:16px">' + t('todays_top_stories') + '</h2>';
  topics.forEach(function(topic) {
    // Source links
    var sourcesHtml = '';
    if (topic.sources && topic.sources.length) {
      sourcesHtml = '<div class="source-links"><span class="source-label">' + t('sources') + ':</span>';
      topic.sources.forEach(function(s) {
        var zhClass = s.lang === 'zh' ? ' zh' : '';
        sourcesHtml += '<a class="source-badge' + zhClass + '" href="' + s.url + '" target="_blank" rel="noopener" title="' + s.title + '">' +
          s.name + ' <span class="arrow">↗</span></a>';
      });
      sourcesHtml += '</div>';
    }

    html += '<div class="hot-topic-item">' +
      '<span class="rank">#' + topic.rank + '</span>' +
      '<h4>' + topic.title + '</h4>' +
      '<div class="meta">' + t('impact') + ': ' + repeatStr('⭐', topic.magnitude || 1) + ' &middot; ' + (topic.category || '') + ' &middot; ' + ((topic.key_players || []).join(', ')) + '</div>' +
      '<p>' + topic.summary + '</p>' +
      sourcesHtml +
      '</div>';
  });
  document.getElementById('hot-topics').innerHTML = html;
}

function repeatStr(str, count) {
  return Array(count + 1).join(str);
}

function renderCategoryChart(data) {
  var dom = document.getElementById('chart-category');
  if (!data || !data.length) return;
  var chart = echarts.init(dom);
  chart.setOption({
    tooltip: { trigger: 'item' },
    series: [{
      type: 'pie', radius: ['45%', '75%'],
      itemStyle: { borderRadius: 6, borderColor: '#0f0f1a', borderWidth: 3 },
      label: { color: '#888', fontSize: 12 },
      data: data.map(function(d) { return { name: d.category, value: d.count }; })
    }]
  });
}

function renderSentimentChart(data) {
  if (!data) return;
  var chart = echarts.init(document.getElementById('chart-sentiment'));
  chart.setOption({
    tooltip: { trigger: 'axis' },
    xAxis: { type: 'category', data: [t('positive'), t('neutral'), t('negative')], axisLabel: { color: '#888' } },
    yAxis: { type: 'value', axisLabel: { color: '#888' } },
    series: [{
      type: 'bar',
      data: [
        { value: data.positive || 0, itemStyle: { color: '#4caf50' } },
        { value: data.neutral || 0, itemStyle: { color: '#ff9800' } },
        { value: data.negative || 0, itemStyle: { color: '#f44336' } }
      ],
      barWidth: '50%'
    }]
  });
}

function renderImpactChart(data) {
  if (!data || !data.length) return;
  var chart = echarts.init(document.getElementById('chart-impact'));
  chart.setOption({
    tooltip: {
      trigger: 'axis', axisPointer: { type: 'shadow' },
      formatter: function(params) {
        var d = params[0];
        var item = data[data.length - 1 - d.dataIndex];
        var label = item ? (item.article_title || item.source_name || '') : '';
        return label ? label + '<br/>' + t('impact') + ': ' + d.value : t('impact') + ': ' + d.value;
      }
    },
    grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
    xAxis: { type: 'value', max: 5, axisLabel: { color: '#888' } },
    yAxis: { type: 'category', data: data.map(function(d) { return (d.article_title || d.id).substring(0, 40); }).reverse(), axisLabel: { color: '#ccc', fontSize: 11, width: 140, overflow: 'truncate' } },
    series: [{
      type: 'bar',
      data: data.map(function(d) {
        return { value: d.magnitude, itemStyle: { color: d.magnitude >= 4 ? '#ff6b6b' : d.magnitude >= 3 ? '#ffd93d' : '#00d4ff' } };
      }),
      barWidth: '60%',
      label: { show: true, position: 'right', color: '#888' }
    }]
  });
  // Click handler to open source URL
  chart.on('click', function(params) {
    var idx = data.length - 1 - params.dataIndex;
    if (idx >= 0 && data[idx].source_url) {
      window.open(data[idx].source_url, '_blank');
    }
  });
}

function renderRadarChart(data) {
  if (!data || !data.length) return;
  var chart = echarts.init(document.getElementById('chart-radar'));
  var maxCount = Math.max.apply(null, data.map(function(d) { return d.count; }).concat([1]));
  chart.setOption({
    radar: {
      indicator: data.map(function(d) { return { name: d.domain, max: maxCount }; }),
      center: ['50%', '55%'], radius: '70%',
      axisName: { color: '#ccc', fontSize: 11 }
    },
    series: [{
      type: 'radar',
      data: [{ value: data.map(function(d) { return d.count; }), name: 'Article Count', areaStyle: { color: 'rgba(0,212,255,0.2)' }, lineStyle: { color: '#00d4ff' }, itemStyle: { color: '#00d4ff' } }]
    }]
  });
}

function renderNetworkChart(data) {
  var container = document.getElementById('chart-network');
  // Clear previous SVG
  container.innerHTML = '';
  if (!data || !data.nodes || !data.nodes.length) {
    container.innerHTML = '<div style="text-align:center;padding:100px;color:#888">' + t('no_entity_data') + '</div>';
    return;
  }
  var width = container.clientWidth;
  var height = 420;
  var svg = d3.select('#chart-network').append('svg').attr('width', width).attr('height', height);

  var nodes = data.nodes.map(function(d) {
    return Object.assign({}, d, { radius: Math.max(8, Math.min(30, (d.weight || 1) * 5)) });
  });
  var links = (data.edges || []).map(function(d) {
    return { source: d.source, target: d.target, relation: d.relation, strength: d.strength };
  });

  var simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(function(d) { return d.id; }).distance(100))
    .force('charge', d3.forceManyBody().strength(-200))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide().radius(function(d) { return d.radius + 2; }));

  var link = svg.append('g').selectAll('line').data(links).join('line')
    .attr('stroke', '#2a2a4a').attr('stroke-width', function(d) { return Math.max(1, d.strength * 3); });

  var node = svg.append('g').selectAll('circle').data(nodes).join('circle')
    .attr('r', function(d) { return d.radius; }).attr('fill', '#00d4ff').attr('opacity', 0.8)
    .call(d3.drag()
      .on('start', function(e, d) { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', function(e, d) { d.fx = e.x; d.fy = e.y; })
      .on('end', function(e, d) { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));

  var label = svg.append('g').selectAll('text').data(nodes).join('text')
    .text(function(d) { return d.id; }).attr('font-size', 10).attr('fill', '#ccc').attr('text-anchor', 'middle').attr('dy', function(d) { return d.radius + 12; });

  simulation.on('tick', function() {
    link.attr('x1', function(d) { return d.source.x; }).attr('y1', function(d) { return d.source.y; })
      .attr('x2', function(d) { return d.target.x; }).attr('y2', function(d) { return d.target.y; });
    node.attr('cx', function(d) { return d.x; }).attr('cy', function(d) { return d.y; });
    label.attr('x', function(d) { return d.x; }).attr('y', function(d) { return d.y; });
  });

  var relationTypes = [];
  links.forEach(function(l) { if (relationTypes.indexOf(l.relation) === -1) relationTypes.push(l.relation); });
  var legend = svg.append('g').attr('transform', 'translate(10, ' + (height - 20 - relationTypes.length * 20) + ')');
  relationTypes.forEach(function(rel, i) {
    legend.append('rect').attr('x', 0).attr('y', i * 20).attr('width', 12).attr('height', 12).attr('fill', '#00d4ff').attr('opacity', 0.6);
    legend.append('text').attr('x', 18).attr('y', i * 20 + 10).text(rel.replace(/_/g, ' ')).attr('fill', '#888').attr('font-size', 10);
  });
}

function renderTrends(trends) {
  if (!trends) return;
  document.getElementById('trend-section').innerHTML =
    '<h3>' + t('trend_analysis') + '</h3>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px">' +
    '<div><span class="trend-dim">' + t('technology') + '</span><p style="margin-top:6px;font-size:13px">' + (trends.technology || 'N/A') + '</p></div>' +
    '<div><span class="trend-dim">' + t('application') + '</span><p style="margin-top:6px;font-size:13px">' + (trends.application || 'N/A') + '</p></div>' +
    '<div><span class="trend-dim">' + t('policy') + '</span><p style="margin-top:6px;font-size:13px">' + (trends.policy || 'N/A') + '</p></div>' +
    '<div><span class="trend-dim">' + t('capital') + '</span><p style="margin-top:6px;font-size:13px">' + (trends.capital || 'N/A') + '</p></div>' +
    '</div>';
}

function renderRiskOppTable(items) {
  if (!items || !items.length) return;
  var html = '';
  items.forEach(function(item) {
    var typeLabel = item.type === 'risk' ? t('risk') : t('opportunity');
    var typeBadge = item.type === 'risk'
      ? '<span class="badge badge-risk">' + typeLabel + '</span>'
      : '<span class="badge badge-opportunity">' + typeLabel + '</span>';
    var level = item.severity || item.potential || 'medium';
    var levelLabel = level === 'high' ? t('high') : level === 'medium' ? t('medium') : t('low');
    var levelBadge = '<span class="badge badge-' + level + '">' + levelLabel + '</span>';
    html += '<tr><td>' + typeBadge + '</td><td>' + item.title + '</td><td>' + levelBadge + '</td><td>' + item.description + '</td></tr>';
  });
  document.querySelector('#risk-opp-table tbody').innerHTML = html;
}

// ── Init ──
(function(data) {
  // Set initial language button states
  document.getElementById('btn-zh').className = currentLang === 'zh' ? 'active' : '';
  document.getElementById('btn-en').className = currentLang === 'en' ? 'active' : '';
  refreshUI();
})(DASHBOARD_DATA);
</script>
</body>
</html>
